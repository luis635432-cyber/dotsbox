<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LociBox Pro</title>
    <meta name="apple-mobile-web-app-title" content="LociBox">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23000000%22/><g transform=%22translate(25,25) scale(2)%22 fill=%22none%22 stroke=%22%233b82f6%22 stroke-width=%221.5%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><path d=%22M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z%22/><polyline points=%223.27 6.96 12 12.01 20.73 6.96%22/><line x1=%2212%22 y1=%2222.08%22 x2=%2212%22 y2=%2212%22/><circle cx=%2212%22 cy=%225%22 r=%221.5%22 fill=%22%233b82f6%22 stroke=%22none%22/></g></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: system-ui, -apple-system, sans-serif; background-color: #000000; }
        .box-card { transition: all 0.2s; border-radius: 1.5rem; cursor: pointer; }
        .box-card:active { transform: scale(0.96); }
        .is-listening { animation: pulse 1.5s infinite; background-color: #7f1d1d !important; color: #fca5a5 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-dark { background-color: rgba(0, 0, 0, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    </style>
</head>
<body class="text-gray-200 min-h-screen pb-28">
<header class="glass-dark p-4 border-b border-gray-800/60 sticky top-0 z-20 flex justify-center items-center">
        <img src="logo.png" alt="LociBox Logo" class="h-16 w-auto object-contain">
    </header>
    

    <div id="view-almacen" class="block">
        <div class="p-4 pb-2">
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg">🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar objeto o caja..." class="w-full pl-12 pr-4 py-3.5 rounded-2xl bg-[#1c1c1e] border border-gray-800 shadow-inner outline-none focus:ring-2 focus:ring-blue-500 font-medium transition-all text-white placeholder-gray-500">
            </div>
        </div>

        <div id="filterIndicator" class="px-4 pb-2 hidden">
            <div class="bg-blue-900/30 border border-blue-800/50 rounded-xl p-3 flex justify-between items-center text-xs font-bold text-blue-400">
                <span id="filterIndicatorText">📍 Mostrando solo: Despacho</span>
                <button onclick="quitarFiltroZona()" class="bg-blue-500/20 text-blue-300 px-3 py-1 rounded-lg active:bg-blue-500/40">Ver todas</button>
            </div>
        </div>

        <main id="boxGrid" class="p-4 grid grid-cols-2 gap-4 items-stretch"></main>
    </div>

    <div id="view-zonas" class="hidden p-4">
        <h2 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-4 ml-2">¿Dónde vas a buscar?</h2>
        <div id="zonasGrid" class="flex flex-col gap-3"></div>
    </div>

    <div id="view-ajustes" class="hidden p-4">
        <h2 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-3 ml-2">Tus Zonas / Habitaciones</h2>
        <div class="bg-[#1c1c1e] rounded-3xl p-4 border border-gray-800 mb-6">
            <div class="flex gap-2 mb-4">
                <input type="text" id="newZoneInput" placeholder="Ej: Garaje, Coche..." class="flex-grow p-3 rounded-xl bg-black border border-gray-700 outline-none focus:border-blue-500 text-sm font-medium text-white placeholder-gray-600">
                <button onclick="crearNuevaZona()" class="bg-blue-600 text-white px-5 rounded-xl font-bold active:bg-blue-800">✚</button>
            </div>
            <div id="listaZonasAjustes" class="flex flex-col gap-2"></div>
        </div>

        <h2 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-3 ml-2">Copias e Informes</h2>
        <div class="bg-[#1c1c1e] rounded-3xl border border-gray-800 overflow-hidden mb-6">
            <button onclick="exportarBackup()" class="w-full p-5 flex items-center justify-between border-b border-gray-800 active:bg-black transition-all">
                <div class="flex items-center gap-4">
                    <div class="bg-blue-900/40 text-blue-400 w-10 h-10 rounded-full flex items-center justify-center text-lg">📤</div>
                    <div class="text-left">
                        <p class="font-bold text-gray-200">Exportar Copia (.json)</p>
                        <p class="text-[11px] text-gray-500">Copia completa de la app</p>
                    </div>
                </div>
                <span class="text-gray-600">❯</span>
            </button>

            <button onclick="exportarExcel()" class="w-full p-5 flex items-center justify-between border-b border-gray-800 active:bg-black transition-all">
                <div class="flex items-center gap-4">
                    <div class="bg-green-900/40 text-green-400 w-10 h-10 rounded-full flex items-center justify-center text-lg">📊</div>
                    <div class="text-left">
                        <p class="font-bold text-gray-200">Exportar a Excel (.csv)</p>
                        <p class="text-[11px] text-gray-500">Lista para PC con ubicaciones</p>
                    </div>
                </div>
                <span class="text-gray-600">❯</span>
            </button>

            <button onclick="document.getElementById('importInput').click()" class="w-full p-5 flex items-center justify-between active:bg-black transition-all">
                <div class="flex items-center gap-4">
                    <div class="bg-indigo-900/40 text-indigo-400 w-10 h-10 rounded-full flex items-center justify-center text-lg">📥</div>
                    <div class="text-left">
                        <p class="font-bold text-gray-200">Importar Copia</p>
                        <p class="text-[11px] text-gray-500">Restaura datos desde .json</p>
                    </div>
                </div>
                <span class="text-gray-600">❯</span>
            </button>
            <input type="file" id="importInput" accept=".json" class="hidden" onchange="importarBackup(event)">
        </div>

        <h2 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-3 ml-2">Zona de Peligro</h2>
        <div class="bg-[#1c1c1e] rounded-3xl border border-red-900/30 overflow-hidden">
            <button onclick="if(confirm('¿Borrar TODO?')){localStorage.clear(); location.reload();}" class="w-full p-5 flex items-center gap-4 active:bg-red-950 transition-all">
                <div class="bg-red-900/40 text-red-500 w-10 h-10 rounded-full flex items-center justify-center text-lg">🗑️</div>
                <div class="text-left">
                    <p class="font-bold text-red-500">Resetear Aplicación</p>
                    <p class="text-[11px] text-gray-500">Borra todo el inventario de la memoria</p>
                </div>
            </button>
        </div>
    </div>

    <nav class="glass-dark fixed bottom-0 left-0 w-full border-t border-gray-800 pb-safe pt-2 px-2 flex justify-around z-30 h-20">
        <button onclick="cambiarPestana('almacen')" class="flex flex-col items-center justify-center w-20 gap-1 active:scale-95 transition-transform">
            <span id="tab-icon-almacen" class="text-2xl grayscale-0 opacity-100 transition-all drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]">📦</span>
            <span id="tab-text-almacen" class="text-[10px] font-bold text-blue-500 transition-colors">Almacén</span>
        </button>

        <button onclick="cambiarPestana('zonas')" class="flex flex-col items-center justify-center w-20 gap-1 active:scale-95 transition-transform">
            <span id="tab-icon-zonas" class="text-2xl grayscale opacity-60 transition-all">🗺️</span>
            <span id="tab-text-zonas" class="text-[10px] font-bold text-gray-500 transition-colors">Zonas</span>
        </button>
        
        <button onclick="cambiarPestana('ajustes')" class="flex flex-col items-center justify-center w-20 gap-1 active:scale-95 transition-transform">
            <span id="tab-icon-ajustes" class="text-2xl grayscale opacity-60 transition-all">⚙️</span>
            <span id="tab-text-ajustes" class="text-[10px] font-bold text-gray-500 transition-colors">Ajustes</span>
        </button>
    </nav>

    <div id="boxModal" class="hidden fixed inset-0 glass-dark z-50 flex items-end sm:items-center justify-center transition-opacity">
        <div class="bg-[#1c1c1e] w-full sm:w-96 rounded-t-[2rem] sm:rounded-3xl p-6 h-[85vh] sm:h-auto flex flex-col shadow-2xl relative border border-gray-800">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-2xl font-black text-blue-500 uppercase tracking-tighter">📦 CAJA --</h2>
                <button onclick="cerrarModal()" class="bg-gray-800 text-gray-400 w-10 h-10 rounded-full font-bold text-lg active:bg-gray-700">X</button>
            </div>

            <div class="mb-3">
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Nombre de esta caja:</label>
                <input type="text" id="modalCustomName" placeholder="Ej: Herramientas" onchange="guardarNombreCaja(this.value)" class="w-full mt-1 p-3 rounded-xl bg-black border border-gray-700 outline-none focus:border-blue-500 font-semibold text-white placeholder-gray-600">
            </div>

            <div class="mb-4">
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Ubicación / Habitación:</label>
                <select id="modalZonaSelect" onchange="guardarZonaCaja(this.value)" class="w-full mt-1 p-3 rounded-xl bg-black border border-gray-700 outline-none focus:border-blue-500 font-semibold text-white appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%236b7280%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:12px_solid] bg-[right_15px_center] bg-no-repeat">
                </select>
            </div>

            <div class="flex-grow overflow-y-auto no-scrollbar mb-4 border-t border-b border-gray-800 py-4" id="modalItemsList"></div>

            <div class="flex gap-2 items-center mb-1">
                <input type="text" id="modalNewItem" placeholder="Añadir objeto..." class="flex-grow p-3.5 rounded-xl bg-black border border-gray-700 outline-none focus:border-blue-500 text-sm font-medium text-white placeholder-gray-500">
                <button id="modalVoiceBtn" class="bg-gray-800 text-gray-400 w-12 h-12 rounded-xl flex items-center justify-center active:bg-gray-700 transition-all">
                    <span id="modalMicIcon" class="text-xl">🎤</span>
                </button>
                <button onclick="añadirItemManual()" class="bg-blue-600 text-white w-12 h-12 rounded-xl font-bold text-lg active:bg-blue-800 transition-all">✚</button>
            </div>
            <div id="modalDebugLog" class="text-[10px] text-blue-400 font-bold text-center hidden mt-1">Listo</div>
        </div>
    </div>

    <script>
        let totalCajas = parseInt(localStorage.getItem('miInventario_totalCajas')) || 20;
        let inventario = JSON.parse(localStorage.getItem('miInventario_v5')) || {};
        let listaZonas = JSON.parse(localStorage.getItem('miInventario_zonas')) || ["Despacho", "Trastero", "Dormitorio", "Armario"];
        let filtroZonaActual = ""; 

        function verificarEstructuraCajas() {
            for(let i=1; i<=totalCajas; i++) {
                let id = i < 10 ? '0'+i : i.toString();
                if(!inventario[id]) inventario[id] = { titulo: "", items: [], zona: "" };
                if(!inventario[id].zona) inventario[id].zona = ""; 
            }
        }
        verificarEstructuraCajas();
        guardarDatos();

        function guardarDatos() {
            localStorage.setItem('miInventario_v5', JSON.stringify(inventario));
            localStorage.setItem('miInventario_totalCajas', totalCajas);
            localStorage.setItem('miInventario_zonas', JSON.stringify(listaZonas));
        }

        function añadirNuevaCaja() {
            totalCajas++;
            let id = totalCajas < 10 ? '0'+totalCajas : totalCajas.toString();
            inventario[id] = { titulo: "", items: [], zona: "" };
            guardarDatos();
            render();
            setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
        }

        function cambiarPestana(pestana) {
            document.getElementById('view-almacen').classList.add('hidden');
            document.getElementById('view-zonas').classList.add('hidden');
            document.getElementById('view-ajustes').classList.add('hidden');

            ["almacen", "zonas", "ajustes"].forEach(t => {
                document.getElementById(`tab-text-${t}`).className = "text-[10px] font-bold text-gray-500 transition-colors";
                document.getElementById(`tab-icon-${t}`).className = "text-2xl grayscale opacity-60 transition-all";
                document.getElementById(`tab-icon-${t}`).style.filter = "none";
            });

            document.getElementById(`view-${pestana}`).classList.remove('hidden');
            document.getElementById(`tab-text-${pestana}`).className = "text-[10px] font-bold text-blue-500 transition-colors";
            document.getElementById(`tab-icon-${pestana}`).className = "text-2xl grayscale-0 opacity-100 transition-all drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]";

            if (pestana === 'almacen') render(searchInput.value);
            if (pestana === 'zonas') renderZonasTab();
            if (pestana === 'ajustes') renderZonasAjustes();
        }

        function renderZonasTab() {
            const grid = document.getElementById('zonasGrid');
            grid.innerHTML = '';
            listaZonas.forEach(zona => {
                let numCajas = Object.values(inventario).filter(c => c.zona === zona).length;
                grid.innerHTML += `
                    <button onclick="filtrarPorZona('${zona}')" class="w-full bg-[#1c1c1e] p-5 rounded-2xl border border-gray-800 shadow-sm flex justify-between items-center active:bg-black transition-all">
                        <div class="flex items-center gap-3">
                            <span class="text-xl">📍</span>
                            <span class="font-bold text-gray-200 text-sm">${zona}</span>
                        </div>
                        <span class="text-xs bg-gray-800 text-gray-400 font-bold px-3 py-1 rounded-full">${numCajas} ${numCajas === 1 ? 'caja' : 'cajas'}</span>
                    </button>
                `;
            });
        }

        function filtrarPorZona(zona) {
            filtroZonaActual = zona;
            document.getElementById('filterIndicatorText').innerText = `📍 Mostrando solo: ${zona}`;
            document.getElementById('filterIndicator').classList.remove('hidden');
            cambiarPestana('almacen');
        }

        function quitarFiltroZona() {
            filtroZonaActual = "";
            document.getElementById('filterIndicator').classList.add('hidden');
            render(searchInput.value);
        }

        function renderZonasAjustes() {
            const lista = document.getElementById('listaZonasAjustes');
            lista.innerHTML = '';
            listaZonas.forEach((zona, idx) => {
                lista.innerHTML += `
                    <div class="flex justify-between items-center bg-black p-3 rounded-xl border border-gray-800">
                        <span class="text-sm font-semibold text-gray-300">📍 ${zona}</span>
                        <button onclick="eliminarZona(${idx})" class="text-red-500 font-bold px-2 active:scale-110 transition-transform">✕</button>
                    </div>
                `;
            });
        }

        function crearNuevaZona() {
            const input = document.getElementById('newZoneInput');
            const valor = input.value.trim();
            if(valor && !listaZonas.includes(valor)) {
                listaZonas.push(valor);
                guardarDatos();
                input.value = '';
                renderZonasAjustes();
            }
        }

        function eliminarZona(idx) {
            const zona = listaZonas[idx];
            if(confirm(`¿Borrar zona "${zona}"?`)) {
                for(let id in inventario) { if(inventario[id].zona === zona) inventario[id].zona = ""; }
                listaZonas.splice(idx, 1);
                guardarDatos();
                renderZonasAjustes();
            }
        }

        const boxGrid = document.getElementById('boxGrid');
        const searchInput = document.getElementById('searchInput');

        function render(filtro = "") {
            boxGrid.innerHTML = '';
            for (let i = 1; i <= totalCajas; i++) {
                const id = i < 10 ? '0' + i : i.toString();
                const caja = inventario[id];
                const contenidoTexto = caja.items.join(", ");
                const tituloMostrar = caja.titulo ? caja.titulo : `CAJA ${id}`;
                
                if (filtroZonaActual && caja.zona !== filtroZonaActual) continue;
                if (filtro && !contenidoTexto.toLowerCase().includes(filtro.toLowerCase()) && 
                    !tituloMostrar.toLowerCase().includes(filtro.toLowerCase()) && 
                    !id.includes(filtro) && !caja.zona.toLowerCase().includes(filtro.toLowerCase())) continue;
                
                boxGrid.innerHTML += `
                    <div onclick="abrirModal('${id}')" class="box-card h-full bg-[#1c1c1e] p-5 border border-gray-800 flex flex-col items-center text-center relative overflow-hidden justify-between">
                        <div class="flex flex-col items-center w-full">
                            <span class="text-2xl mb-1 drop-shadow-md">📦</span>
                            <span class="text-[11px] font-black text-blue-400 uppercase leading-tight mt-1">${tituloMostrar}</span>
                            
                            ${caja.zona ? `<span class="mt-2 text-[11px] leading-tight text-center bg-gray-800 text-white px-3 py-1.5 rounded-lg font-bold whitespace-normal w-11/12 shadow-inner border border-gray-700">📍 ${caja.zona}</span>` : ''}
                            
                            <p class="mt-3 text-[12px] text-gray-300 font-medium line-clamp-2">
                                ${caja.items.length > 0 ? contenidoTexto : '<span class="text-gray-500 italic font-normal">Vacía</span>'}
                            </p>
                        </div>
                        ${caja.items.length > 0 ? `<div class="mt-3 text-[10px] bg-blue-900/30 border border-blue-800/50 text-blue-300 px-3 py-1 rounded-full font-bold shrink-0">${caja.items.length} ítems</div>` : ''}
                    </div>
                `;
            }

            if (!filtro && !filtroZonaActual) {
                boxGrid.innerHTML += `
                    <div onclick="addNuevaCaja()" class="box-card h-full border-2 border-dashed border-gray-700 bg-[#1c1c1e]/50 p-5 flex flex-col items-center justify-center text-center opacity-80 active:opacity-100 min-h-[160px]">
                        <span class="text-3xl text-gray-600 mb-1 drop-shadow-md">➕</span>
                        <span class="text-[11px] font-black text-gray-500 uppercase mt-2">Crear Caja ${totalCajas + 1}</span>
                    </div>
                `;
            }
        }
        function addNuevaCaja() { añadirNuevaCaja(); }
        
        render();
        searchInput.addEventListener('input', (e) => render(e.target.value));

        const modal = document.getElementById('boxModal');
        let cajaAbiertaActual = null;

        function abrirModal(id) {
            cajaAbiertaActual = id;
            document.getElementById('modalTitle').innerText = `📦 CAJA ${id}`;
            document.getElementById('modalCustomName').value = inventario[id].titulo;
            
            const select = document.getElementById('modalZonaSelect');
            select.innerHTML = '<option value="">⚠️ Sin asignar</option>';
            listaZonas.forEach(zona => {
                const selected = inventario[id].zona === zona ? 'selected' : '';
                select.innerHTML += `<option value="${zona}" ${selected}>📍 ${zona}</option>`;
            });

            renderItemsModal();
            modal.classList.remove('hidden');
        }

        function cerrarModal() {
            if(Speech && recognition) recognition.stop(); 
            modal.classList.add('hidden');
            cajaAbiertaActual = null;
            render(searchInput.value);
        }

        function guardarNombreCaja(n) { inventario[cajaAbiertaActual].titulo = n; guardarDatos(); }
        function guardarZonaCaja(z) { inventario[cajaAbiertaActual].zona = z; guardarDatos(); }

        function renderItemsModal() {
            const fontColor = 'text-gray-200';
            const lista = document.getElementById('modalItemsList');
            lista.innerHTML = '';
            const items = inventario[cajaAbiertaActual].items;

            if(items.length === 0) {
                lista.innerHTML = '<p class="text-center text-gray-600 text-sm italic mt-10">La caja está vacía</p>';
                return;
            }

            items.forEach((item, index) => {
                lista.innerHTML += `
                    <div class="flex justify-between items-center bg-black p-3 rounded-xl mb-2 border border-gray-800">
                        <span class="text-sm font-medium ${fontColor} capitalize">${item}</span>
                        <button onclick="borrarItem(${index})" class="text-red-400 bg-red-900/30 w-8 h-8 rounded-full flex items-center justify-center font-bold active:bg-red-900/50">X</button>
                    </div>
                `;
            });
        }

        function borrarItem(index) { inventario[cajaAbiertaActual].items.splice(index, 1); guardarDatos(); renderItemsModal(); }

        function añadirItemManual() {
            const input = document.getElementById('modalNewItem');
            const valor = input.value.trim();
            if (valor) {
                let items = valor.split(/ y |,| e /).map(i => i.trim()).filter(i => i);
                inventario[cajaAbiertaActual].items.push(...items);
                guardarDatos();
                input.value = '';
                renderItemsModal();
            }
        }

        function exportarBackup() {
            const d = { inventario: inventario, totalCajas: totalCajas, zonas: listaZonas, exportadoEn: new Date().toISOString() };
            const b = new Blob([JSON.stringify(d, null, 2)], { type: "application/json" });
            const u = URL.createObjectURL(b);
            const a = document.createElement('a'); a.href = u; a.download = `lociBox_backup_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
        }

        function importarBackup(e) {
            const file = e.target.files[0];
            if (!file) return;
            const r = new FileReader();
            r.onload = function(ev) {
                try {
                    const d = JSON.parse(ev.target.result);
                    if (d.inventario && d.totalCajas && confirm('¿Reemplazar inventario actual?')) {
                        inventario = d.inventario; totalCajas = parseInt(d.totalCajas);
                        if(d.zonas) listaZonas = d.zonas;
                        verificarEstructuraCajas(); guardarDatos(); render();
                        alert('¡Restaurado con éxito!');
                    }
                } catch (err) { alert('Error al leer archivo.'); }
                e.target.value = '';
            };
            r.readAsText(file);
        }

        function exportarExcel() {
            let csv = "\uFEFFCaja;Identificador;Nombre;Ubicacion;Objetos;Cantidad\n";
            for (let i = 1; i <= totalCajas; i++) {
                const id = i < 10 ? '0' + i : i.toString(); const c = inventario[id];
                csv += `${i};"${id}";"${c.titulo?c.titulo.replace(/;/g, ","):`Caja ${id}`}";"${c.zona?c.zona.replace(/;/g, ","):"Sin asignar"}";"${c.items.length>0?c.items.join(", ").replace(/;/g, "-"):"Vacía"}";${c.items.length}\n`;
            }
            const b = new Blob([csv], { type: "text/csv;charset=utf-8;" }); const u = URL.createObjectURL(b);
            const a = document.createElement('a'); a.href = u; a.download = `lociBox_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
        }

        const modalVoiceBtn = document.getElementById('modalVoiceBtn');
        const modalMicIcon = document.getElementById('modalMicIcon');
        const modalDebugLog = document.getElementById('modalDebugLog');
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (Speech) {
            recognition = new Speech();
            recognition.lang = 'es-ES'; recognition.continuous = false;
            modalVoiceBtn.addEventListener('click', () => {
                if (cajaAbiertaActual) {
                    try {
                        recognition.start(); modalVoiceBtn.classList.add('is-listening');
                        modalMicIcon.innerText = "🛑"; modalDebugLog.innerText = "Escuchando...";
                        modalDebugLog.classList.remove('hidden');
                    } catch (e) { recognition.stop(); }
                }
            });
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.trim().toLowerCase();
                if (cajaAbiertaActual && transcript.length > 1) {
                    let itemsNuevos = transcript.split(/ y |,| e /).map(i => i.trim()).filter(i => i);
                    inventario[cajaAbiertaActual].items.push(...itemsNuevos);
                    guardarDatos(); renderItemsModal();
                    modalDebugLog.innerText = `¡Guardado: ${itemsNuevos.join(", ")}!`;
                    setTimeout(() => modalDebugLog.classList.add('hidden'), 2000);
                }
            };
            recognition.onerror = () => stopListeningVisuals();
            recognition.onend = () => stopListeningVisuals();
            function stopListeningVisuals() { modalVoiceBtn.classList.remove('is-listening'); modalMicIcon.innerText = "🎤"; }
        } else { modalVoiceBtn.style.display = 'none'; }

        // --- DETECTOR DE CÓDIGOS QR ---
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const abrirId = urlParams.get('abrir');
            if (abrirId) {
                let numId = parseInt(abrirId);
                if (numId > totalCajas) { totalCajas = numId; verificarEstructuraCajas(); guardarDatos(); }
                let idFormateado = numId < 10 ? '0' + numId : numId.toString();
                setTimeout(() => abrirModal(idFormateado), 300);
            }
        });
    </script>
</body>
</html>
