<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dotsbox Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: system-ui, -apple-system, sans-serif; }
        .box-card { transition: all 0.2s; border-radius: 2rem; cursor: pointer; }
        .box-card:active { transform: scale(0.96); }
        .is-listening { animation: pulse 1.5s infinite; background-color: #fecaca !important; color: #ef4444 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <header class="bg-white/80 backdrop-blur-md p-6 shadow-sm sticky top-0 z-20 flex justify-center items-center">
        <h1 class="text-xl font-black text-blue-600 tracking-tighter">DOTSBOX 📦</h1>
    </header>

    <div id="view-almacen" class="block">
        <div class="p-4 pb-2">
            <input type="text" id="searchInput" placeholder="Buscar objeto o caja..." class="w-full p-4 rounded-2xl bg-white border border-slate-100 shadow-sm outline-none focus:ring-2 focus:ring-blue-400 font-medium transition-all text-slate-700">
        </div>

        <main id="boxGrid" class="p-4 grid grid-cols-2 gap-4"></main>
    </div>


    <div id="view-ajustes" class="hidden p-4">
        <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3 ml-2">Copias e Informes</h2>
        
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden mb-6">
            <button onclick="exportarBackup()" class="w-full p-5 flex items-center justify-between border-b border-slate-50 active:bg-slate-50 transition-all">
                <div class="flex items-center gap-4">
                    <div class="bg-blue-100 text-blue-600 w-10 h-10 rounded-full flex items-center justify-center text-lg">📤</div>
                    <div class="text-left">
                        <p class="font-bold text-slate-700">Exportar Copia (.json)</p>
                        <p class="text-[11px] text-slate-400">El seguro de vida de la app para restaurar datos</p>
                    </div>
                </div>
                <span class="text-slate-300">❯</span>
            </button>

            <button onclick="exportarExcel()" class="w-full p-5 flex items-center justify-between border-b border-slate-50 active:bg-slate-50 transition-all">
                <div class="flex items-center gap-4">
                    <div class="bg-green-100 text-green-600 w-10 h-10 rounded-full flex items-center justify-center text-lg">📊</div>
                    <div class="text-left">
                        <p class="font-bold text-slate-700">Exportar a Excel (.csv)</p>
                        <p class="text-[11px] text-slate-400">Lista limpia para leer, imprimir o editar en PC</p>
                    </div>
                </div>
                <span class="text-slate-300">❯</span>
            </button>

            <button onclick="document.getElementById('importInput').click()" class="w-full p-5 flex items-center justify-between active:bg-slate-50 transition-all">
                <div class="flex items-center gap-4">
                    <div class="bg-indigo-100 text-indigo-600 w-10 h-10 rounded-full flex items-center justify-center text-lg">📥</div>
                    <div class="text-left">
                        <p class="font-bold text-slate-700">Importar Copia</p>
                        <p class="text-[11px] text-slate-400">Restaura tus cajas desde tu archivo .json</p>
                    </div>
                </div>
                <span class="text-slate-300">❯</span>
            </button>
            <input type="file" id="importInput" accept=".json" class="hidden" onchange="importarBackup(event)">
        </div>

        <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3 ml-2">Zona de Peligro</h2>
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <button onclick="if(confirm('¿Borrar TODO y volver a 20 cajas vacías?')){localStorage.clear(); location.reload();}" class="w-full p-5 flex items-center gap-4 active:bg-red-50 transition-all">
                <div class="bg-red-100 text-red-600 w-10 h-10 rounded-full flex items-center justify-center text-lg">🗑️</div>
                <div class="text-left">
                    <p class="font-bold text-red-600">Resetear Aplicación</p>
                    <p class="text-[11px] text-slate-400">Borra todo el inventario actual de la memoria</p>
                </div>
            </button>
        </div>
    </div>


    <nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-200 pb-safe pt-2 px-6 flex justify-around z-30 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] h-20">
        <button onclick="cambiarPestana('almacen')" class="flex flex-col items-center justify-center w-20 gap-1 active:scale-95 transition-transform">
            <span id="tab-icon-almacen" class="text-2xl grayscale-0 opacity-100 transition-all">📦</span>
            <span id="tab-text-almacen" class="text-[10px] font-bold text-blue-600 transition-colors">Almacén</span>
        </button>
        
        <button onclick="cambiarPestana('ajustes')" class="flex flex-col items-center justify-center w-20 gap-1 active:scale-95 transition-transform">
            <span id="tab-icon-ajustes" class="text-2xl grayscale opacity-40 transition-all">⚙️</span>
            <span id="tab-text-ajustes" class="text-[10px] font-bold text-slate-400 transition-colors">Ajustes</span>
        </button>
    </nav>


    <div id="boxModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center transition-opacity">
        <div class="bg-white w-full sm:w-96 rounded-t-3xl sm:rounded-3xl p-6 h-[85vh] sm:h-auto flex flex-col shadow-2xl relative">
            
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-2xl font-black text-blue-600 uppercase tracking-tighter">📦 CAJA --</h2>
                <button onclick="cerrarModal()" class="bg-slate-100 text-slate-500 w-10 h-10 rounded-full font-bold text-lg active:bg-slate-200">X</button>
            </div>

            <div class="mb-4">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Nombre de esta caja:</label>
                <input type="text" id="modalCustomName" placeholder="Ej: Herramientas Pesadas" onchange="guardarNombreCaja(this.value)" class="w-full mt-1 p-3 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:border-blue-400 font-semibold text-slate-700">
            </div>

            <div class="flex-grow overflow-y-auto no-scrollbar mb-4 border-t border-b border-slate-100 py-4" id="modalItemsList"></div>

            <div class="flex gap-2 items-center mb-1">
                <input type="text" id="modalNewItem" placeholder="Escribir objeto..." class="flex-grow p-3.5 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:border-blue-400 text-sm font-medium">
                
                <button id="modalVoiceBtn" class="bg-slate-100 text-slate-500 w-12 h-12 rounded-xl flex items-center justify-center active:bg-slate-200 transition-all">
                    <span id="modalMicIcon" class="text-xl">🎤</span>
                </button>
                
                <button onclick="añadirItemManual()" class="bg-blue-600 text-white w-12 h-12 rounded-xl font-bold text-lg active:bg-blue-800 transition-all">✚</button>
            </div>
            <div id="modalDebugLog" class="text-[9px] text-slate-400 text-center hidden mt-1">Listo</div>
        </div>
    </div>

    <script>
        // --- GESTIÓN DE CONFIGURACIÓN Y CAJAS ---
        let totalCajas = parseInt(localStorage.getItem('miInventario_totalCajas')) || 20;
        let inventario = JSON.parse(localStorage.getItem('miInventario_v5')) || {};

        function verificarEstructuraCajas() {
            for(let i=1; i<=totalCajas; i++) {
                let id = i < 10 ? '0'+i : i.toString();
                if(!inventario[id]) inventario[id] = { titulo: "", items: [] };
            }
        }
        verificarEstructuraCajas();
        guardarDatos();

        function guardarDatos() {
            localStorage.setItem('miInventario_v5', JSON.stringify(inventario));
            localStorage.setItem('miInventario_totalCajas', totalCajas);
        }

        function añadirNuevaCaja() {
            totalCajas++;
            let id = totalCajas < 10 ? '0'+totalCajas : totalCajas.toString();
            inventario[id] = { titulo: "", items: [] };
            guardarDatos();
            render();
            setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 100);
        }

        // --- SISTEMA DE NAVEGACIÓN (TABS) ---
        function cambiarPestana(pestana) {
            const vistaAlmacen = document.getElementById('view-almacen');
            const vistaAjustes = document.getElementById('view-ajustes');
            const textAlmacen = document.getElementById('tab-text-almacen');
            const textAjustes = document.getElementById('tab-text-ajustes');
            const iconAlmacen = document.getElementById('tab-icon-almacen');
            const iconAjustes = document.getElementById('tab-icon-ajustes');

            if (pestana === 'almacen') {
                vistaAlmacen.classList.remove('hidden');
                vistaAjustes.classList.add('hidden');
                textAlmacen.className = "text-[10px] font-bold text-blue-600 transition-colors";
                iconAlmacen.className = "text-2xl grayscale-0 opacity-100 transition-all";
                textAjustes.className = "text-[10px] font-bold text-slate-400 transition-colors";
                iconAjustes.className = "text-2xl grayscale opacity-40 transition-all";
            } else {
                vistaAlmacen.classList.add('hidden');
                vistaAjustes.className = "hidden"; // Fix syntax/class
                vistaAjustes.classList.remove('hidden');
                textAjustes.className = "text-[10px] font-bold text-blue-600 transition-colors";
                iconAjustes.className = "text-2xl grayscale-0 opacity-100 transition-all";
                textAlmacen.className = "text-[10px] font-bold text-slate-400 transition-colors";
                iconAlmacen.className = "text-2xl grayscale opacity-40 transition-all";
            }
        }

        // --- RENDERIZADO DE CAJAS ---
        const boxGrid = document.getElementById('boxGrid');
        const searchInput = document.getElementById('searchInput');

        function render(filtro = "") {
            boxGrid.innerHTML = '';
            for (let i = 1; i <= totalCajas; i++) {
                const id = i < 10 ? '0' + i : i.toString();
                const caja = inventario[id];
                const contenidoTexto = caja.items.join(", ");
                const tituloMostrar = caja.titulo ? caja.titulo : `CAJA ${id}`;
                
                if (filtro && !contenidoTexto.toLowerCase().includes(filtro.toLowerCase()) && 
                    !tituloMostrar.toLowerCase().includes(filtro.toLowerCase()) && 
                    !id.includes(filtro)) continue;
                
                boxGrid.innerHTML += `
                    <div onclick="abrirModal('${id}')" class="box-card bg-white p-5 shadow-sm border border-slate-100 flex flex-col items-center text-center">
                        <span class="text-2xl opacity-40 mb-2">📦</span>
                        <span class="text-[10px] font-black text-blue-500 uppercase leading-tight">${tituloMostrar}</span>
                        <p class="mt-2 text-[11px] text-slate-500 font-bold line-clamp-3">
                            ${caja.items.length > 0 ? contenidoTexto : '<span class="text-slate-200">Vacía</span>'}
                        </p>
                        ${caja.items.length > 0 ? `<div class="mt-2 text-[8px] bg-blue-50 text-blue-600 px-2 py-1 rounded-full font-bold">${caja.items.length} ítems</div>` : ''}
                    </div>
                `;
            }

            if (!filtro) {
                boxGrid.innerHTML += `
                    <div onclick="añadirNuevaCaja()" class="box-card border-2 border-dashed border-slate-300 bg-slate-50/50 p-5 flex flex-col items-center justify-center text-center opacity-80 active:opacity-100 min-h-[140px]">
                        <span class="text-3xl text-slate-400 mb-1">➕</span>
                        <span class="text-[10px] font-black text-slate-500 uppercase">Crear Caja ${totalCajas + 1}</span>
                    </div>
                `;
            }
        }
        render();
        searchInput.addEventListener('input', (e) => render(e.target.value));

        // --- LÓGICA DE VENTANA MODAL ---
        const modal = document.getElementById('boxModal');
        let cajaAbiertaActual = null;

        function abrirModal(id) {
            cajaAbiertaActual = id;
            document.getElementById('modalTitle').innerText = `📦 CAJA ${id}`;
            document.getElementById('modalCustomName').value = inventario[id].titulo;
            renderItemsModal();
            modal.classList.remove('hidden');
        }

        function cerrarModal() {
            if(Speech && recognition) recognition.stop(); 
            modal.classList.add('hidden');
            cajaAbiertaActual = null;
            render(searchInput.value);
        }

        function guardarNombreCaja(nuevoNombre) {
            inventario[cajaAbiertaActual].titulo = nuevoNombre;
            guardarDatos();
        }

        function renderItemsModal() {
            const lista = document.getElementById('modalItemsList');
            lista.innerHTML = '';
            const items = inventario[cajaAbiertaActual].items;

            if(items.length === 0) {
                lista.innerHTML = '<p class="text-center text-slate-300 text-sm italic mt-10">La caja está vacía</p>';
                return;
            }

            items.forEach((item, index) => {
                lista.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl mb-2 border border-slate-100">
                        <span class="text-sm font-medium text-slate-700 capitalize">${item}</span>
                        <button onclick="borrarItem(${index})" class="text-red-500 bg-red-100 w-8 h-8 rounded-full flex items-center justify-center font-bold active:bg-red-200">X</button>
                    </div>
                `;
            });
        }

        function borrarItem(index) {
            inventario[cajaAbiertaActual].items.splice(index, 1);
            guardarDatos();
            renderItemsModal();
        }

        // Entrada manual por botón ✚
        function añadirItemManual() {
            const input = document.getElementById('modalNewItem');
            const valor = input.value.trim();
            if (valor) {
                let itemsNuevos = valor.split(/ y |,| e /).map(i => i.trim()).filter(i => i);
                inventario[cajaAbiertaActual].items.push(...itemsNuevos);
                guardarDatos();
                input.value = '';
                renderItemsModal();
            }
        }

        // --- FUNCIONES DEL BÚNKER (EXPORTAR / IMPORTAR BACKUPS JSON) ---
        function exportarBackup() {
            const dataBackup = {
                inventario: inventario,
                totalCajas: totalCajas,
                exportadoEn: new Date().toISOString()
            };
            const jsonString = JSON.stringify(dataBackup, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const enlace = document.createElement('a');
            enlace.href = url;
            const fecha = new Date().toISOString().split('T')[0];
            enlace.download = `dotsbox_backup_${fecha}.json`;
            document.body.appendChild(enlace);
            enlace.click();
            document.body.removeChild(enlace);
            URL.revokeObjectURL(url);
        }

        function importarBackup(event) {
            const archivo = event.target.files[0];
            if (!archivo) return;
            const lector = new FileReader();
            lector.onload = function(e) {
                try {
                    const datosParseados = JSON.parse(e.target.result);
                    if (datosParseados.inventario && datosParseados.totalCajas) {
                        if(confirm('¿Estás seguro? Esto reemplazará todo tu inventario actual.')) {
                            inventario = datosParseados.inventario;
                            totalCajas = parseInt(datosParseados.totalCajas);
                            verificarEstructuraCajas();
                            guardarDatos();
                            render();
                            alert('¡Copia de seguridad restaurada con éxito! 🥳');
                        }
                    } else { alert('Error: Formato de archivo inválido.'); }
                } catch (err) { alert('Error crítico al leer el archivo.'); }
                event.target.value = '';
            };
            lector.readAsText(archivo);
        }

        // --- 🌟 NUEVA FUNCIÓN: EXPORTAR A EXCEL (CSV EN ESPAÑOL) 🌟 ---
        function exportarExcel() {
            // \uFEFF añade el BOM UTF-8 para que Excel en Windows lea bien acentos y eñes
            let csvContent = "\uFEFF";
            
            // Cabecera de columnas separadas por punto y coma (Estándar Excel Europeo)
            csvContent += "Caja;Identificador;Nombre Personalizado;Objetos Guardados;Cantidad\n";
            
            for (let i = 1; i <= totalCajas; i++) {
                const id = i < 10 ? '0' + i : i.toString();
                const caja = inventario[id];
                
                // Limpiamos los textos de puntos y comas para no romper las columnas de Excel
                const nombreCaja = caja.titulo ? caja.titulo.replace(/;/g, ",") : `Caja ${id}`;
                const listaObjetos = caja.items.length > 0 ? caja.items.join(", ").replace(/;/g, "-") : "Vacía";
                const cantidad = caja.items.length;
                
                // Añadimos la fila entrecomillando los textos largos por seguridad
                csvContent += `${i};"${id}";"${nombreCaja}";"${listaObjetos}";${cantidad} items\n`;
            }
            
            // Creamos el archivo y forzamos la descarga nativa en iOS/PC
            const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const enlace = document.createElement('a');
            enlace.href = url;
            
            const fecha = new Date().toISOString().split('T')[0];
            enlace.download = `dotsbox_excel_${fecha}.csv`;
            
            document.body.appendChild(enlace);
            enlace.click();
            document.body.removeChild(enlace);
            URL.revokeObjectURL(url);
        }

        // --- SISTEMA DE VOZ INTEGRADO EN CAJAS ---
        const modalVoiceBtn = document.getElementById('modalVoiceBtn');
        const modalMicIcon = document.getElementById('modalMicIcon');
        const modalDebugLog = document.getElementById('modalDebugLog');
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (Speech) {
            recognition = new Speech();
            recognition.lang = 'es-ES';
            recognition.continuous = false;

            modalVoiceBtn.addEventListener('click', () => {
                if (cajaAbiertaActual) {
                    try {
                        recognition.start();
                        modalVoiceBtn.classList.add('is-listening');
                        modalMicIcon.innerText = "🛑"; 
                        modalDebugLog.innerText = "Escuchando objeto(s)...";
                        modalDebugLog.classList.remove('hidden');
                    } catch (e) { recognition.stop(); }
                }
            });

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.trim().toLowerCase();
                
                if (cajaAbiertaActual && transcript.length > 1) {
                    let itemsNuevos = transcript.split(/ y |,| e /).map(i => i.trim()).filter(i => i);
                    inventario[cajaAbiertaActual].items.push(...itemsNuevos);
                    guardarDatos();
                    renderItemsModal();
                    
                    modalDebugLog.innerText = `¡Guardado: ${itemsNuevos.join(", ")}!`;
                    setTimeout(() => modalDebugLog.classList.add('hidden'), 2000);
                }
            };

            recognition.onerror = (event) => {
                modalDebugLog.innerText = "Error: " + event.error;
                stopListeningVisuals();
            };

            recognition.onend = () => { stopListeningVisuals(); };

            function stopListeningVisuals() {
                modalVoiceBtn.classList.remove('is-listening');
                modalMicIcon.innerText = "🎤";
            }
        } else {
            modalVoiceBtn.style.display = 'none';
        }
    </script>
</body>
</html>
