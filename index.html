<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LociBox Pro 2.0</title>
    <meta name="apple-mobile-web-app-title" content="LociBox">
    <link rel="apple-touch-icon" href="logoappiniciolocibox.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: system-ui, -apple-system, sans-serif; background-color: #000000; }
        .box-card { transition: all 0.2s; cursor: pointer; }
        .box-card:active { transform: scale(0.96); }
        .is-listening { animation: pulse 1.5s infinite; background-color: #7f1d1d !important; color: #fca5a5 !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-dark { background-color: rgba(0, 0, 0, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .ghost-mode { opacity: 0.4; filter: grayscale(50%); border-color: #1f2937 !important; }
    </style>
</head>
<body class="text-gray-200 min-h-screen pb-28">

    <header class="glass-dark p-4 border-b border-gray-800/60 sticky top-0 z-20 flex justify-center items-center">
        <img src="logo.png" alt="LociBox Logo" class="h-[22px] w-auto object-contain">
    </header>

    <div id="view-almacen" class="block relative min-h-screen">
        <div class="p-4 pb-2">
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg">🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar..." class="w-full pl-12 pr-4 py-3.5 rounded-2xl bg-[#1c1c1e] border border-gray-800 shadow-inner outline-none focus:ring-2 focus:ring-blue-600 font-medium transition-all text-white placeholder-gray-500">
            </div>
        </div>

        <div class="px-4 pb-2 flex justify-between items-center gap-2">
            <button onclick="addNuevaCaja()" class="flex items-center gap-1.5 bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm active:bg-blue-700 transition-colors shadow-[0_0_10px_rgba(37,99,235,0.3)] shrink-0">
                <span>➕</span> <span>Caja</span>
            </button>

            <div id="filterIndicator" class="hidden flex-grow bg-blue-900/30 border border-blue-800/50 rounded-xl p-2.5 flex justify-between items-center text-xs font-bold text-blue-400 mx-1">
                <span id="filterIndicatorText" class="truncate pr-1">🏷️ Zona</span>
                <button onclick="quitarFiltroZona()" class="bg-blue-500/20 text-blue-300 px-2 py-1 rounded-lg active:bg-blue-500/40 shrink-0">Todas</button>
            </div>
            
            <div class="flex bg-[#1c1c1e] border border-gray-800 rounded-xl overflow-hidden ml-auto shrink-0">
                <button onclick="cambiarModoVista('grid')" id="btnViewGrid" class="px-3 py-2 text-gray-500 active:bg-gray-800 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                </button>
                <button onclick="cambiarModoVista('lista')" id="btnViewLista" class="px-3 py-2 text-blue-500 bg-blue-900/20 active:bg-gray-800 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                </button>
            </div>
        </div>

        <main id="boxGrid" class="p-4"></main>
    </div>

    <div id="view-zonas" class="hidden p-4">
        <h2 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-4 ml-2">¿Dónde vas a buscar?</h2>
        <div id="zonasGrid" class="flex flex-col gap-3"></div>
    </div>

    <div id="view-ajustes" class="hidden p-4">
        <h2 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-3 ml-2">Estado del Servidor</h2>
        <div class="bg-[#1c1c1e] rounded-3xl p-4 border border-gray-800 mb-6 flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)] animate-pulse"></div>
            <span class="text-sm font-bold text-gray-200">Nube de Google Conectada</span>
        </div>
        <h2 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-3 ml-2">Tus Zonas / Habitaciones</h2>
        <div class="bg-[#1c1c1e] rounded-3xl p-4 border border-gray-800 mb-6">
            <div class="flex gap-2 mb-4">
                <input type="text" id="newZoneInput" placeholder="Ej: Garaje..." class="flex-grow p-3 rounded-xl bg-black border border-gray-700 outline-none focus:border-blue-500 text-sm font-medium text-white placeholder-gray-600">
                <button onclick="crearNuevaZona()" class="bg-blue-600 text-white px-5 rounded-xl font-bold active:bg-blue-800">✚</button>
            </div>
            <div id="listaZonasAjustes" class="flex flex-col gap-2"></div>
        </div>
    </div>

    <nav class="glass-dark fixed bottom-0 left-0 w-full border-t border-gray-800 pb-safe pt-2 px-2 flex justify-around z-30 h-20">
        <button onclick="cambiarPestana('almacen')" class="flex flex-col items-center justify-center w-20 gap-1"><span id="tab-icon-almacen" class="text-2xl drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]">📦</span><span id="tab-text-almacen" class="text-[10px] font-bold text-blue-500">Almacén</span></button>
        <button onclick="cambiarPestana('zonas')" class="flex flex-col items-center justify-center w-20 gap-1"><span id="tab-icon-zonas" class="text-2xl grayscale opacity-60">🗺️</span><span id="tab-text-zonas" class="text-[10px] font-bold text-gray-500">Zonas</span></button>
        <button onclick="cambiarPestana('ajustes')" class="flex flex-col items-center justify-center w-20 gap-1"><span id="tab-icon-ajustes" class="text-2xl grayscale opacity-60">⚙️</span><span id="tab-text-ajustes" class="text-[10px] font-bold text-gray-500">Ajustes</span></button>
    </nav>

    <div id="boxModal" class="hidden fixed inset-0 glass-dark z-50 flex items-end sm:items-center justify-center">
        <div class="bg-[#1c1c1e] w-full sm:w-96 rounded-t-[2rem] sm:rounded-3xl p-6 h-[85vh] sm:h-auto flex flex-col shadow-2xl relative border border-gray-800">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-2xl font-black text-blue-500 uppercase tracking-tighter">📦 CAJA --</h2>
                <button onclick="cerrarModal()" class="bg-gray-800 text-gray-400 w-10 h-10 rounded-full font-bold text-lg active:bg-gray-700">X</button>
            </div>
            <input type="text" id="modalCustomName" placeholder="Nombre caja" onchange="guardarNombreCaja(this.value)" class="w-full mb-4 p-3 rounded-xl bg-black border border-gray-700 text-white">
            <select id="modalZonaSelect" onchange="guardarZonaCaja(this.value)" class="w-full mb-4 p-3 rounded-xl bg-black border border-gray-700 text-white"></select>
            <div class="flex-grow overflow-y-auto no-scrollbar mb-4 border-t border-b border-gray-800 py-4" id="modalItemsList"></div>
            <div class="flex gap-2 items-center mb-1">
                <input type="text" id="modalNewItem" placeholder="Añadir objeto..." class="flex-grow p-3.5 rounded-xl bg-black border border-gray-700 text-white">
                <button id="modalVoiceBtn" class="bg-gray-800 text-gray-400 w-12 h-12 rounded-xl text-xl">🎤</button>
                <button onclick="añadirItemManual()" class="bg-blue-600 text-white w-12 h-12 rounded-xl font-bold text-lg">✚</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBXofbNFQRt6YDPQWv7hIS7OgLRk1SscYg", authDomain: "locibox.firebaseapp.com", projectId: "locibox", storageBucket: "locibox.firebasestorage.app", messagingSenderId: "567800822474", appId: "1:567800822474:web:b2e27d6a1bbb6d8f9f9233" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let totalCajas = parseInt(localStorage.getItem('miInventario_totalCajas')) || 20;
        let inventario = JSON.parse(localStorage.getItem('miInventario_v5')) || {};
        let listaZonas = JSON.parse(localStorage.getItem('miInventario_zonas')) || ["Despacho", "Trastero", "Dormitorio", "Armario"];
        let filtroZonaActual = ""; let modoVista = localStorage.getItem('locibox_modoVista') || 'lista'; let acordeonesEstado = {};

        function verificarEstructuraCajas() {
            for(let i=1; i<=totalCajas; i++) {
                let id = i < 10 ? '0'+i : i.toString();
                if(!inventario[id]) inventario[id] = { titulo: "", items: [], zona: "" };
                if(!inventario[id].zona) inventario[id].zona = ""; 
            }
        }
        db.collection("datos").doc("miInventario").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                inventario = data.inventario || {}; totalCajas = data.totalCajas || 20; listaZonas = data.listaZonas || ["Despacho", "Trastero", "Dormitorio", "Armario"];
                verificarEstructuraCajas(); listaZonas.forEach(z => { if(acordeonesEstado[z] === undefined) acordeonesEstado[z] = true; });
                render(searchInput.value);
            }
        });
        function guardarDatos() {
            localStorage.setItem('miInventario_v5', JSON.stringify(inventario)); localStorage.setItem('miInventario_totalCajas', totalCajas); localStorage.setItem('miInventario_zonas', JSON.stringify(listaZonas));
            db.collection("datos").doc("miInventario").set({ inventario: inventario, totalCajas: totalCajas, listaZonas: listaZonas });
        }
        function cambiarModoVista(modo) {
            modoVista = modo; localStorage.setItem('locibox_modoVista', modo);
            const btnGrid = document.getElementById('btnViewGrid'); const btnLista = document.getElementById('btnViewLista');
            btnGrid.className = (modo === 'grid' ? "px-3 py-2 text-blue-500 bg-blue-900/20" : "px-3 py-2 text-gray-500") + " active:bg-gray-800 transition-colors";
            btnLista.className = (modo === 'lista' ? "px-3 py-2 text-blue-500 bg-blue-900/20" : "px-3 py-2 text-gray-500") + " active:bg-gray-800 transition-colors";
            render(searchInput.value);
        }
        function toggleAcordeon(zona) { acordeonesEstado[zona] = !acordeonesEstado[zona]; render(searchInput.value); }
        function añadirNuevaCaja() { totalCajas++; let id = totalCajas < 10 ? '0'+totalCajas : totalCajas.toString(); inventario[id] = { titulo: "", items: [], zona: "" }; guardarDatos(); }
        function cambiarPestana(pestana) {
            document.getElementById('view-almacen').classList.add('hidden'); document.getElementById('view-zonas').classList.add('hidden'); document.getElementById('view-ajustes').classList.add('hidden');
            ["almacen", "zonas", "ajustes"].forEach(t => { document.getElementById(`tab-text-${t}`).className = "text-[10px] font-bold text-gray-500"; document.getElementById(`tab-icon-${t}`).className = "text-2xl grayscale opacity-60"; });
            document.getElementById(`view-${pestana}`).classList.remove('hidden'); document.getElementById(`tab-text-${pestana}`).className = "text-[10px] font-bold text-blue-500"; document.getElementById(`tab-icon-${pestana}`).className = "text-2xl drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]";
            if (pestana === 'almacen') render(searchInput.value);
        }
        function render(filtro = "") {
            boxGrid.innerHTML = ''; let agrupado = {}; listaZonas.forEach(z => agrupado[z] = []); agrupado["Sin asignar"] = [];
            for (let i = 1; i <= totalCajas; i++) {
                const id = i < 10 ? '0' + i : i.toString(); const caja = inventario[id] || { titulo: "", items: [], zona: "" };
                if (filtroZonaActual && caja.zona !== filtroZonaActual && !(caja.zona==="" && filtroZonaActual==="Sin asignar")) continue;
                if (filtro && !caja.items.join(" ").toLowerCase().includes(filtro.toLowerCase()) && !(caja.titulo||"").toLowerCase().includes(filtro.toLowerCase())) continue;
                let zonaDestino = caja.zona || "Sin asignar";
                if(agrupado[zonaDestino]) agrupado[zonaDestino].push({ id, caja });
            }
            for (let zona in agrupado) {
                const cajasDeZona = agrupado[zona]; if (cajasDeZona.length === 0 && (filtro || zona === "Sin asignar")) continue;
                const isOpen = acordeonesEstado[zona] !== false;
                boxGrid.innerHTML += `<div class="mb-4"><button onclick="toggleAcordeon('${zona}')" class="w-full flex justify-between items-center text-gray-400 pb-2 text-[10px] font-bold tracking-widest uppercase"><span>🏷️ ${zona} (${cajasDeZona.length})</span> <span>${isOpen ? '▼' : '▶'}</span></button>
                    ${isOpen ? `<div class="${modoVista === 'grid' ? 'grid grid-cols-2 gap-3' : 'flex flex-col gap-2'}">${cajasDeZona.map(item => `
                        <div onclick="abrirModal('${item.id}')" class="box-card ${item.caja.items.length === 0 ? 'ghost-mode' : ''} bg-[#1c1c1e] p-3 rounded-xl border border-gray-800">
                            <div class="flex items-center gap-3"><span class="text-xl">📦</span>
                                <div class="flex flex-col overflow-hidden"><span class="text-[11px] font-black text-blue-400 uppercase truncate">${item.caja.titulo || 'Caja '+item.id}</span>
                                <span class="text-[10px] text-gray-500 truncate">${item.caja.items.join(", ") || 'Vacía'}</span></div>
                            </div>
                        </div>`).join('')}</div>` : ''}</div>`;
            }
        }
        function abrirModal(id) { cajaAbiertaActual = id; document.getElementById('modalTitle').innerText = '📦 CAJA '+id; document.getElementById('modalCustomName').value = inventario[id].titulo || ""; const s = document.getElementById('modalZonaSelect'); s.innerHTML = '<option value="">⚠️ Sin asignar</option>' + listaZonas.map(z => `<option value="${z}" ${inventario[id].zona === z ? 'selected' : ''}>🏷️ ${z}</option>`).join(''); renderItemsModal(); modal.classList.remove('hidden'); }
        function cerrarModal() { modal.classList.add('hidden'); }
        function renderItemsModal() { document.getElementById('modalItemsList').innerHTML = inventario[cajaAbiertaActual].items.length === 0 ? '<p class="text-center text-gray-600 text-sm italic">Vacía</p>' : inventario[cajaAbiertaActual].items.map((it, idx) => `<div class="flex justify-between items-center bg-black p-3 rounded-xl mb-2 border border-gray-800"><span class="text-sm text-gray-200 capitalize">${it}</span><button onclick="borrarItem(${idx})" class="text-red-400 bg-red-900/30 w-8 h-8 rounded-full">X</button></div>`).join(''); }
        function borrarItem(idx) { inventario[cajaAbiertaActual].items.splice(idx, 1); guardarDatos(); renderItemsModal(); }
        function añadirItemManual() { const input = document.getElementById('modalNewItem'); if (input.value) { inventario[cajaAbiertaActual].items.push(input.value); guardarDatos(); input.value = ''; renderItemsModal(); } }
        searchInput.addEventListener('input', (e) => render(e.target.value));
        cambiarModoVista(modoVista);
    </script>
</body>
</html>
